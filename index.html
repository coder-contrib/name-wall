<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coder Workshop — Wall of Names</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <img class="logo" src="assets/Logo-white.svg" alt="Coder" />
    <h1>Wall of Names</h1>
    <p class="join">Log in at <a href="https://workshop.cdr.dev" target="_blank" rel="noopener">workshop.cdr.dev</a></p>
    <p class="sub">Then tell the agent <code>"make my name blue"</code> and open a PR.</p>
    <!-- Single green pill: shows "● N active now". On hover (admin display) it
         reveals "Admin · Wall of Fame". Hidden unless the server has Coder API
         access (the token-bearing admin display). -->
    <div id="activity" class="activity" hidden>
      <span class="dot"></span>
      <span class="activity-label"><span id="active-count">0</span> active now</span>
      <span class="activity-admin">Admin · Wall of Fame</span>
    </div>
  </header>
  <main id="wall" aria-live="polite"></main>
  <footer>
    <span id="count">0</span> contributors · live from
    <a href="https://github.com/coder-contrib/name-wall" target="_blank" rel="noopener"><code>coder-contrib/name-wall</code></a>
  </footer>
  <script src="wall.js"></script>
</body>
</html>
