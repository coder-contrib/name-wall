<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coder Workshop — Wall of Names</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <img class="logo" src="assets/Logo-white.svg" alt="Coder" />
      <span class="wordmark">Wall of Names</span>
    </div>
    <div class="cta">
      <span class="cta-step">1 · Log in at <a href="https://workshop.cdr.dev" target="_blank" rel="noopener">workshop.cdr.dev</a></span>
      <span class="cta-step">2 · Tell the agent <code>“make my name blue”</code> → open a PR</span>
    </div>
    <!-- Activity pill: "● N active now"; hover (admin display) → "Admin · Wall of Fame".
         Hidden unless the server has Coder API access (admin display). -->
    <div id="activity" class="activity" hidden>
      <span class="dot"></span>
      <span class="activity-label"><span id="active-count">0</span> active now</span>
      <span class="activity-admin">Admin · Wall of Fame</span>
    </div>
  </header>
  <main id="wall" aria-live="polite"></main>
  <!-- Admin roster (admin display only): who's logged in + who still needs the
       agents-access role. Hidden unless the server has Coder API access. -->
  <aside id="roster" class="roster" hidden>
    <div class="roster-title">Attendees <span id="roster-count">0</span></div>
    <ul id="roster-list"></ul>
  </aside>
  <aside id="queue" class="queue" hidden>
    <div class="queue-title">PR Queue <span id="queue-count">0</span></div>
    <ul id="queue-list"></ul>
  </aside>
  <footer>
    <span id="count">0</span> contributors · live from
    <a href="https://github.com/coder-contrib/name-wall" target="_blank" rel="noopener"><code>coder-contrib/name-wall</code></a>
  </footer>
  <script src="wall.js"></script>
</body>
</html>
